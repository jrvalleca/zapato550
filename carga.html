<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargador Masivo Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #334155; }
        .drop-zone { border: 2px dashed #334155; padding: 20px; text-align: center; border-radius: 15px; margin: 20px 0; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; }
        .stats { margin-top: 20px; background: #0f172a; padding: 15px; border-radius: 12px; display: none; }
        .progress { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-top: 10px; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: var(--accent); transition: 0.2s; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="text-align:center; color:var(--accent)">Carga Ortodoxa</h2>
        <p style="font-size: 0.8rem; text-align: center; color: #94a3b8;">Columnas: <b>sku</b>, <b>marbete</b>, <b>marca</b></p>
        <div class="drop-zone">
            <input type="file" id="fileIn" accept=".xlsx, .xls">
        </div>
        <button id="upBtn" disabled>INICIAR CARGA</button>
        <div id="statBox" class="stats">
            <div style="display:flex; justify-content:space-between"><span>Registros:</span> <b id="total">0</b></div>
            <div style="display:flex; justify-content:space-between"><span>Subidos:</span> <b id="proc">0</b></div>
            <div class="progress"><div id="bar"></div></div>
        </div>
        <p id="msg" style="text-align:center; font-size:0.8rem; margin-top:15px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
            authDomain: "buscadorcalzadoliv.firebaseapp.com",
            projectId: "buscadorcalzadoliv",
            storageBucket: "buscadorcalzadoliv.firebasestorage.app",
            messagingSenderId: "851864036279",
            appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let data = [];

        document.getElementById('fileIn').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ex) => {
                const wb = XLSX.read(ex.target.result, { type: 'binary' });
                data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(data.length > 0) {
                    document.getElementById('upBtn').disabled = false;
                    document.getElementById('statBox').style.display = 'block';
                    document.getElementById('total').innerText = data.length;
                }
            };
            reader.readAsBinaryString(e.target.files[0]);
        });

        document.getElementById('upBtn').addEventListener('click', async () => {
            document.getElementById('upBtn').disabled = true;
            let c = 0;
            for(const i of data) {
                if(i.sku && i.marbete) {
                    await addDoc(collection(db, "calzado"), {
                        sku: String(i.sku).trim().toUpperCase(),
                        marbete: String(i.marbete).trim().toUpperCase(),
                        marca: i.marca ? String(i.marca).trim().toUpperCase() : "GENERAL",
                        fecha: serverTimestamp()
                    });
                }
                c++;
                document.getElementById('proc').innerText = c;
                document.getElementById('bar').style.width = (c/data.length)*100 + "%";
            }
            document.getElementById('msg').innerHTML = "<b>¡COMPLETO!</b>";
            alert("Carga terminada");
        });
    </script>
</body>
</html>
