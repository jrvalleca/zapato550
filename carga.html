<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Carga Flexible</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            color: #e2e8f0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 { color: #38bdf8; font-size: 22px; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }

        .file-box {
            margin-bottom: 20px;
            padding: 25px;
            border: 2px dashed #334155;
            border-radius: 12px;
            background: #161e2e;
        }

        input[type="file"] { width: 100%; color: #94a3b8; }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        button:disabled { background-color: #475569; }

        #status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .info {
            font-size: 11px;
            color: #64748b;
            margin-top: 15px;
            text-align: left;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Sincronizar Bodega</h1>
        <p>Estructura: sku | marbete</p>

        <div class="file-box">
            <input type="file" id="excelFile" accept=".xlsx, .xls">
        </div>

        <button id="uploadBtn">🔥 Iniciar Sincronización</button>

        <div id="status"></div>

        <div class="info">
            • Se permite el mismo SKU en varios marbetes.<br>
            • Marbetes pueden llevar letras y guiones.<br>
            • Se borrará el inventario anterior antes de cargar.
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
            authDomain: "buscadorcalzadoliv.firebaseapp.com",
            projectId: "buscadorcalzadoliv",
            storageBucket: "buscadorcalzadoliv.firebasestorage.app",
            messagingSenderId: "851864036279",
            appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "calzado");

        const fileInput = document.getElementById('excelFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');

        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files[0]) return alert("Selecciona un archivo Excel");

            uploadBtn.disabled = true;
            statusDiv.style.color = "#38bdf8";
            statusDiv.innerText = "Leyendo archivo...";

            try {
                const file = fileInput.files[0];
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                // 1. LIMPIEZA RESISTENTE
                statusDiv.innerText = "Limpiando base de datos...";
                try {
                    const snapshot = await getDocs(colRef);
                    if (!snapshot.empty) {
                        const deleteBatch = writeBatch(db);
                        snapshot.docs.forEach(d => deleteBatch.delete(d.ref));
                        await deleteBatch.commit();
                    }
                } catch (e) {
                    console.log("Limpieza omitida o sin datos previos.");
                }

                // 2. CARGA DE DATOS (Basado en tu imagen)
                statusDiv.innerText = `Cargando ${jsonData.length} registros...`;
                const uploadBatch = writeBatch(db);
                
                jsonData.forEach(fila => {
                    const skuValue = fila.sku || fila.SKU;
                    const marbeteValue = fila.marbete || fila.MARBETE;

                    if (skuValue && marbeteValue) {
                        const newDoc = doc(colRef);
                        uploadBatch.set(newDoc, {
                            sku: String(skuValue).trim(),
                            marbete: String(marbeteValue).trim(),
                            actualizado: new Date().toISOString()
                        });
                    }
                });

                await uploadBatch.commit();
                
                statusDiv.style.color = "#4ade80";
                statusDiv.innerText = "✅ ¡Cargado con éxito!";
                fileInput.value = "";

            } catch (error) {
                console.error(error);
                statusDiv.style.color = "#f87171";
                statusDiv.innerText = "❌ Error. Revisa permisos de Firebase.";
            } finally {
                uploadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
