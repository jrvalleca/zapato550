<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Admin - Carga Excel a Firebase</title>
  
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>
    body { background-color: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    h1 { text-align: center; color: #4cc9f0; }
    
    .panel-carga {
      background: #16213e;
      padding: 20px;
      border-radius: 15px;
      border: 1px solid #4cc9f0;
      text-align: center;
    }

    input[type="file"] {
      margin: 20px 0;
      color: #4cc9f0;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #4361ee;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled { background-color: #555; }

    #progreso {
      margin-top: 15px;
      color: #f72585;
      font-weight: bold;
      display: none;
    }

    .instrucciones {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>🚀 Panel de Carga Excel</h1>

<div class="panel-carga">
  <p>Selecciona tu archivo de inventario</p>
  <input type="file" id="archivoExcel" accept=".xlsx, .xls, .csv">
  
  <button id="btnSubir" onclick="procesarExcel()">🔥 Subir a la Nube</button>
  
  <div id="progreso">Procesando: 0%</div>

  <div class="instrucciones">
    <strong>Nota:</strong> El Excel debe tener las columnas tituladas como <b>SKU</b> y <b>Marbete</b> en la primera fila.
  </div>
</div>

<script type="module">
  // CONFIGURACIÓN FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
    authDomain: "buscadorcalzadoliv.firebaseapp.com",
    projectId: "buscadorcalzadoliv",
    storageBucket: "buscadorcalzadoliv.firebasestorage.app",
    messagingSenderId: "851864036279",
    appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const coleccion = "calzado";

  window.procesarExcel = async function() {
    const fileInput = document.getElementById("archivoExcel");
    const btn = document.getElementById("btnSubir");
    const progresoDiv = document.getElementById("progreso");

    if (fileInput.files.length === 0) {
      alert("Por favor selecciona un archivo primero.");
      return;
    }

    btn.disabled = true;
    progresoDiv.style.display = "block";
    progresoDiv.innerText = "Leyendo archivo...";

    const archivo = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = async (e) => {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      // Obtener la primera hoja
      const nombreHoja = workbook.SheetNames[0];
      const hoja = workbook.Sheets[nombreHoja];
      
      // Convertir a JSON
      const filas = XLSX.utils.sheet_to_json(hoja);
      
      let subidos = 0;
      const total = filas.length;

      for (let fila of filas) {
        // Buscamos las columnas (insensible a mayúsculas/minúsculas)
        const sku = fila.SKU || fila.sku || fila.Sku;
        const marbete = fila.Marbete || fila.marbete || fila.MARBETE;

        if (sku && marbete) {
          try {
            await addDoc(collection(db, coleccion), {
              sku: String(sku).trim(),
              marbete: String(marbete).trim(),
              fechaCarga: new Date().toISOString()
            });
            subidos++;
            progresoDiv.innerText = `Subiendo: ${subidos} de ${total}`;
          } catch (error) {
            console.error("Error al subir fila:", error);
          }
        }
      }

      alert(`✅ ¡Carga completada! Se agregaron ${subidos} registros.`);
      btn.disabled = false;
      progresoDiv.style.display = "none";
      fileInput.value = "";
    };

    reader.readAsArrayBuffer(archivo);
  }
</script>

</body>
</html>
