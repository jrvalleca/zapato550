<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Buscador con Escáner 👟</title>
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { background-color: #0b1f3a; color: white; font-family: sans-serif; padding: 15px; max-width: 500px; margin: auto; }
    h1 { text-align: center; color: #1e90ff; font-size: 22px; }
    
    .status-bar { background: #000; padding: 10px; border-radius: 8px; font-size: 13px; color: #00ffcc; text-align: center; margin-bottom: 15px; }
    
    /* Contenedor de la Cámara */
    #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #1e90ff; background: #000; display: none; }
    
    input { width: 100%; padding: 15px; margin: 10px 0; font-size: 18px; border-radius: 10px; border: none; box-sizing: border-box; }
    
    button { width: 100%; padding: 15px; margin: 5px 0; font-size: 16px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
    .btn-scan { background-color: #ff9800; color: white; }
    .btn-search { background-color: #28a745; color: white; }
    .btn-clear { background-color: #6c757d; color: white; }

    .card { background: #13294b; margin: 15px 0; padding: 20px; border-radius: 12px; border-left: 6px solid #1e90ff; }
  </style>
</head>
<body>

<h1>👟 Buscador de Calzado</h1>

<div id="status" class="status-bar">Cargando base de datos...</div>

<div id="reader"></div>
<button id="btn-toggle-camera" class="btn-scan" onclick="toggleCamara()">📷 Encender Escáner</button>

<input type="text" id="busqueda" placeholder="SKU detectado...">
<button class="btn-search" onclick="ejecutarBusqueda()">🔍 BUSCAR</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>

<div id="resultados"></div>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
    authDomain: "buscadorcalzadoliv.firebaseapp.com",
    projectId: "buscadorcalzadoliv",
    storageBucket: "buscadorcalzadoliv.firebasestorage.app",
    messagingSenderId: "851864036279",
    appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const coleccion = "calzado";
  let datosLocales = [];

  // CARGA INICIAL
  async function inicializar() {
    try {
      const querySnapshot = await getDocs(collection(db, coleccion));
      datosLocales = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      document.getElementById("status").innerText = `Inventario Listo: ${datosLocales.length} modelos.`;
    } catch (e) { document.getElementById("status").innerText = "Error de conexión."; }
  }

  // LÓGICA DEL ESCÁNER
  let html5QrCode;
  window.toggleCamara = function() {
    const readerDiv = document.getElementById("reader");
    const btn = document.getElementById("btn-toggle-camera");

    if (!html5QrCode) {
      readerDiv.style.display = "block";
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 150 } };

      html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        document.getElementById("busqueda").value = decodedText;
        ejecutarBusqueda(); // Busca automático al detectar
        pararCamara();
      });
      btn.innerText = "❌ Apagar Cámara";
    } else {
      pararCamara();
    }
  }

  function pararCamara() {
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        html5QrCode = null;
        document.getElementById("reader").style.display = "none";
        document.getElementById("btn-toggle-camera").innerText = "📷 Encender Escáner";
      });
    }
  }

  // BÚSQUEDA
  window.ejecutarBusqueda = function() {
    const texto = document.getElementById("busqueda").value.trim().toLowerCase();
    const divRes = document.getElementById("resultados");
    if (!texto) return;

    const filtrados = datosLocales.filter(item => item.sku.toLowerCase() === texto || item.sku.toLowerCase().includes(texto));
    
    divRes.innerHTML = "";
    if (filtrados.length === 0) {
      divRes.innerHTML = "<p style='color:orange;'>No se encontró el SKU.</p>";
    } else {
      filtrados.forEach(item => {
        divRes.innerHTML += `<div class="card"><strong>SKU:</strong> ${item.sku}<br><strong>Marbete:</strong> ${item.marbete}</div>`;
      });
    }
  }

  window.limpiar = function() {
    document.getElementById("busqueda").value = "";
    document.getElementById("resultados").innerHTML = "";
  }

  inicializar();
</script>
</body>
</html>
