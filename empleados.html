<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Buscador de Calzado - Consulta</title>

  <style>
    body {
      background-color: #0b1f3a;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    h1 { text-align: center; color: #1e90ff; }

    .status-bar {
      background: #000;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      color: #00ffcc;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid #1e90ff;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #1e90ff;
      background: #f0f8ff;
      color: #333;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      background-color: #28a745; /* Verde para buscar */
      color: white;
      cursor: pointer;
    }

    .btn-clear { background-color: #6c757d; }

    .card {
      background: #13294b;
      margin: 15px 0;
      padding: 20px;
      border-radius: 12px;
      border-left: 6px solid #1e90ff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .card-info { font-size: 18px; line-height: 1.6; }
    
    footer {
      text-align: center;
      font-size: 12px;
      margin-top: 50px;
      color: #555;
    }
  </style>
</head>
<body>

<h1>👟 Consulta de Inventario</h1>

<div id="status" class="status-bar">Sincronizando...</div>

<input type="text" id="busqueda" placeholder="Escanea o escribe el SKU">
<button onclick="ejecutarBusqueda()">🔍 BUSCAR CALZADO</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>

<div id="resultados"></div>

<footer>Versión de Consulta v1.0</footer>

<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
    authDomain: "buscadorcalzadoliv.firebaseapp.com",
    projectId: "buscadorcalzadoliv",
    storageBucket: "buscadorcalzadoliv.firebasestorage.app",
    messagingSenderId: "851864036279",
    appId: "1:851864036279:web:be11ccf3880f6d05a3fe32",
    measurementId: "G-60KYGCY60G",
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const coleccion = "calzado";

  let datosLocales = []; 

  async function inicializar() {
    const statusDiv = document.getElementById("status");
    try {
      const querySnapshot = await getDocs(collection(db, coleccion));
      datosLocales = [];
      querySnapshot.forEach((docu) => {
        datosLocales.push({ id: docu.id, ...docu.data() });
      });
      statusDiv.innerText = `Inventario actualizado: ${datosLocales.length} modelos.`;
    } catch (e) {
      statusDiv.innerText = "Error de conexión.";
    }
  }

  window.ejecutarBusqueda = function() {
    const texto = document.getElementById("busqueda").value.trim().toLowerCase();
    const divRes = document.getElementById("resultados");

    if (!texto) return;

    divRes.innerHTML = "<p>Buscando...</p>";

    const filtrados = datosLocales.filter(item => 
      item.sku.toLowerCase().includes(texto)
    );

    mostrar(filtrados);
  }

  function mostrar(lista) {
    const div = document.getElementById("resultados");
    div.innerHTML = "";

    if (lista.length === 0) {
      div.innerHTML = "<p style='color:orange;'>No se encontró el SKU.</p>";
      return;
    }

    lista.forEach(item => {
      div.innerHTML += `
        <div class="card">
          <div class="card-info">
            <strong>SKU:</strong> ${item.sku} <br>
            <strong>Marbete:</strong> ${item.marbete}
          </div>
        </div>
      `;
    });
  }

  window.limpiar = function() {
    document.getElementById("busqueda").value = "";
    document.getElementById("resultados").innerHTML = "";
  }

  inicializar();
</script>

</body>
</html>
