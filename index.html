<!DOCTYPE html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Buscador de Calzado Pro</title>

  <style>
    body {
      background-color: #0b1f3a;
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    h1 { text-align: center; color: #1e90ff; }

    .status-bar {
      background: #000;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      color: #00ffcc;
      margin-bottom: 20px;
      text-align: center;
      border: 1px solid #1e90ff;
    }

    input, textarea {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #1e90ff;
      background: #f0f8ff;
      color: #333;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: bold;
      border-radius: 10px;
      border: none;
      background-color: #1e90ff;
      color: white;
      cursor: pointer;
    }

    button:active { transform: scale(0.98); }

    .btn-search { background-color: #28a745; }
    .btn-clear { background-color: #6c757d; }
    .btn-delete { 
      background-color: #dc3545; 
      width: auto; 
      padding: 8px 15px; 
      font-size: 14px; 
      margin: 0;
    }

    .card {
      background: #13294b;
      margin: 15px 0;
      padding: 20px;
      border-radius: 12px;
      border-left: 6px solid #1e90ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .card-info { flex-grow: 1; }

    hr { border: 0; border-top: 1px solid #333; margin: 30px 0; }
  </style>
</head>
<body>

<h1>👟 Buscador de Calzado</h1>

<div id="status" class="status-bar">Conectando con Firebase...</div>

<input type="text" id="busqueda" placeholder="Ingresa SKU del zapato">
<button class="btn-search" onclick="ejecutarBusqueda()">🔍 BUSCAR</button>
<button class="btn-clear" onclick="limpiar()">Limpiar</button>

<div id="resultados"></div>

<hr>

<h2>Carga Masiva (SKU, Marbete)</h2>
<textarea id="masivo" rows="6" placeholder="Ejemplo:&#10;SKU123,MarbeteA&#10;SKU456,MarbeteB"></textarea>
<button onclick="cargaMasiva()">Subir a la Nube 🔥</button>

<script type="module">
  // Configuración de tu proyecto
  const firebaseConfig = {
    apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
    authDomain: "buscadorcalzadoliv.firebaseapp.com",
    projectId: "buscadorcalzadoliv",
    storageBucket: "buscadorcalzadoliv.firebasestorage.app",
    messagingSenderId: "851864036279",
    appId: "1:851864036279:web:be11ccf3880f6d05a3fe32",
    measurementId: "G-60KYGCY60G",
  };

  // Importaciones de Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const coleccion = "calzado";

  let datosLocales = []; // Memoria temporal para evitar lentitud

  // --- FUNCIÓN: DESCARGAR TODO AL INICIO ---
  async function inicializar() {
    const statusDiv = document.getElementById("status");
    try {
      const querySnapshot = await getDocs(collection(db, coleccion));
      datosLocales = [];
      querySnapshot.forEach((docu) => {
        datosLocales.push({ id: docu.id, ...docu.data() });
      });
      statusDiv.innerText = `Base de datos lista: ${datosLocales.length} modelos cargados.`;
    } catch (e) {
      statusDiv.innerText = "Error: Verifica tu conexión o config de Firebase.";
      console.error(e);
    }
  }

  // --- FUNCIÓN: BUSCAR (SÓLO POR CLICK) ---
  window.ejecutarBusqueda = function() {
    const texto = document.getElementById("busqueda").value.trim().toLowerCase();
    const divRes = document.getElementById("resultados");

    if (!texto) {
      alert("Por favor, escribe un SKU.");
      return;
    }

    divRes.innerHTML = "<p>Buscando...</p>";

    // Filtrar en la copia local (esto no consume crédito de Firebase)
    const filtrados = datosLocales.filter(item => 
      item.sku.toLowerCase().includes(texto) || 
      item.marbete.toLowerCase().includes(texto)
    );

    mostrar(filtrados);
  }

  // --- FUNCIÓN: PINTAR RESULTADOS ---
  function mostrar(lista) {
    const div = document.getElementById("resultados");
    div.innerHTML = "";

    if (lista.length === 0) {
      div.innerHTML = "<p style='color:orange;'>No se encontraron resultados.</p>";
      return;
    }

    lista.forEach(item => {
      div.innerHTML += `
        <div class="card">
          <div class="card-info">
            <strong>SKU:</strong> ${item.sku} <br>
            <strong>Marbete:</strong> ${item.marbete}
          </div>
          <button class="btn-delete" onclick="eliminarRegistro('${item.id}')">Borrar</button>
        </div>
      `;
    });
  }

  // --- FUNCIÓN: ELIMINAR ---
  window.eliminarRegistro = async function(id) {
    if (confirm("¿Seguro que quieres borrar este calzado?")) {
      await deleteDoc(doc(db, coleccion, id));
      await inicializar(); // Recargar la memoria local
      ejecutarBusqueda(); // Actualizar la lista que estamos viendo
    }
  }

  // --- FUNCIÓN: CARGA MASIVA ---
  window.cargaMasiva = async function() {
    const texto = document.getElementById("masivo").value;
    const lineas = texto.split("\n");
    let contador = 0;

    for (let linea of lineas) {
      const partes = linea.split(",");
      if (partes.length === 2) {
        const sku = partes[0].trim();
        const marbete = partes[1].trim();
        
        await addDoc(collection(db, coleccion), { sku, marbete });
        contador++;
      }
    }

    alert(`¡Éxito! Se agregaron ${contador} registros.`);
    document.getElementById("masivo").value = "";
    await inicializar(); // Refrescar memoria local
  }

  // --- FUNCIÓN: LIMPIAR ---
  window.limpiar = function() {
    document.getElementById("busqueda").value = "";
    document.getElementById("resultados").innerHTML = "";
  }

  // Ejecutar carga inicial al abrir la app
  inicializar();

</script>

</body>
</html>
