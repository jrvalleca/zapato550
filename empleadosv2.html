<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Bodega - Flujo Completo</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --text-dim: #94a3b8;
        }
        body { 
            background-color: var(--bg); color: #f1f5f9; 
            font-family: system-ui, sans-serif; padding: 15px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        /* Buscador Fijo Arriba */
        .search-section {
            background: var(--card); padding: 20px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid #334155;
            position: sticky; top: 10px; z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .input-group { display: flex; gap: 8px; }
        input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #334155; 
            background: #0f172a; color: white; font-size: 16px;
        }
        #searchBtn { 
            background: var(--accent); color: #0f172a; border: none; 
            border-radius: 12px; padding: 0 20px; font-weight: bold; cursor: pointer;
        }

        /* Título de la lista */
        .list-title { 
            color: var(--text-dim); font-size: 0.75rem; font-weight: bold;
            margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Tarjetas de la Lista */
        #listaBusquedas { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .item-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            border-left: 5px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.9); } }

        .info { flex: 1; }
        .marbete-text { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin: 0; }
        .sku-text { font-size: 0.9rem; color: var(--text-dim); margin: 0; }

        .actions { display: flex; gap: 8px; }

        .btn-action {
            border: none; border-radius: 10px; padding: 10px 12px;
            font-weight: bold; font-size: 0.7rem; cursor: pointer; color: white;
            transition: opacity 0.2s;
        }
        .btn-action:active { opacity: 0.7; }
        .btn-returned { background: #475569; } /* Gris */
        .btn-sold { background: var(--danger); } /* Rojo */

        /* Estado Vendido */
        .item-sold { border-left-color: var(--success); }
        .item-sold .marbete-text { color: var(--success); }
    </style>
</head>
