<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Empleados - Pro</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        input { width: 80%; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 18px; margin-bottom: 10px; }
        button { padding: 15px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #searchBtn { background-color: #38bdf8; color: #0f172a; width: 88%; }
        
        .result-card { background: #1e293b; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid #38bdf8; text-align: left; position: relative; }
        .sku-title { font-size: 14px; color: #94a3b8; margin: 0; }
        .marbete-val { font-size: 28px; color: #f1f5f9; margin: 5px 0; font-weight: bold; }
        
        .sold-btn { 
            background-color: #ef4444; color: white; width: 100%; margin-top: 15px;
            font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        #status { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔍 Buscador</h1>
        <input type="text" id="skuInput" placeholder="Escanea o escribe SKU..." autocomplete="off">
        <button id="searchBtn">BUSCAR UBICACIÓN</button>

        <div id="resultArea"></div>
        <div id="status"></div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
            authDomain: "buscadorcalzadoliv.firebaseapp.com",
            projectId: "buscadorcalzadoliv",
            storageBucket: "buscadorcalzadoliv.firebasestorage.app",
            messagingSenderId: "851864036279",
            appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const skuInput = document.getElementById('skuInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultArea = document.getElementById('resultArea');
        const statusDiv = document.getElementById('status');

        searchBtn.addEventListener('click', buscarSKU);

        async function buscarSKU() {
            const valor = skuInput.value.trim();
            if (!valor) return;

            resultArea.innerHTML = "Buscando...";
            statusDiv.innerText = "";

            try {
                const q = query(collection(db, "calzado"), where("sku", "==", valor));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    resultArea.innerHTML = "❌ No encontrado";
                    // Registrar búsqueda fallida también es útil
                    registrarEnHistorial(valor, "No encontrado", "busqueda_fallida");
                } else {
                    resultArea.innerHTML = "";
                    snapshot.forEach(docSnap => {
                        const data = docSnap.data();
                        const id = docSnap.id;
                        
                        // Crear tarjeta de resultado
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        card.innerHTML = `
                            <p class="sku-title">SKU: ${data.sku}</p>
                            <p class="marbete-val">📍 ${data.marbete}</p>
                            <button class="sold-btn" data-id="${id}" data-sku="${data.sku}" data-marbete="${data.marbete}">
                                💰 MARCAR VENDIDO
                            </button>
                        `;
                        resultArea.appendChild(card);

                        // Registrar en historial que se encontró
                        registrarEnHistorial(data.sku, data.marbete, "consultado");
                    });

                    // Activar botones de "Vendido"
                    document.querySelectorAll('.sold-btn').forEach(btn => {
                        btn.addEventListener('click', marcarComoVendido);
                    });
                }
            } catch (e) {
                console.error(e);
                statusDiv.innerText = "Error en la búsqueda";
            }
        }

        async function registrarEnHistorial(sku, marbete, accion) {
            try {
                await addDoc(collection(db, "historial"), {
                    sku: sku,
                    marbete: marbete,
                    accion: accion, // "consultado", "vendido", "busqueda_fallida"
                    fecha: serverTimestamp(),
                    usuario: "empleado_piso" // Opcional por ahora
                });
            } catch (e) { console.log("Error historial:", e); }
        }

        async function marcarComoVendido(e) {
            const id = e.target.getAttribute('data-id');
            const sku = e.target.getAttribute('data-sku');
            const marbete = e.target.getAttribute('data-marbete');

            if (!confirm(`¿Confirmar venta del SKU ${sku}? Se borrará del sistema.`)) return;

            try {
                // 1. Borrar de la colección principal
                await deleteDoc(doc(db, "calzado", id));
                
                // 2. Registrar la venta en el historial
                await registrarEnHistorial(sku, marbete, "vendido");

                alert("Venta registrada. Inventario actualizado.");
                resultArea.innerHTML = ""; // Limpiar resultados
                skuInput.value = "";
            } catch (e) {
                alert("Error al procesar venta");
                console.error(e);
            }
        }
    </script>
</body>
</html>
