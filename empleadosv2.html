<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Bodega - Empleados</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #22c55e; --danger: #ef4444; --text-dim: #94a3b8;
        }
        body { 
            background-color: var(--bg); color: #f1f5f9; 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        /* Buscador Fijo */
        .search-section {
            background: var(--card); padding: 20px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid #334155;
            position: sticky; top: 10px; z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .input-group { display: flex; gap: 8px; }
        input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #334155; 
            background: #0f172a; color: white; font-size: 16px;
        }
        #searchBtn { 
            background: var(--accent); color: #0f172a; border: none; 
            border-radius: 12px; padding: 0 20px; font-weight: bold; cursor: pointer;
        }

        /* Lista */
        .list-title { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 10px; font-weight: bold; }
        #listaBusquedas { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .item-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            border-left: 5px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }

        .marbete-text { font-size: 1.6rem; font-weight: bold; color: var(--accent); margin: 0; }
        .sku-text { font-size: 0.85rem; color: var(--text-dim); margin: 0; }

        .actions { display: flex; gap: 6px; }
        .btn {
            border: none; border-radius: 8px; padding: 10px 8px;
            font-weight: bold; font-size: 0.65rem; cursor: pointer; color: white;
        }
        .btn-dev { background: #475569; }
        .btn-ven { background: var(--danger); }

        .item-sold { border-left-color: var(--success) !important; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-section">
            <h2 style="margin:0 0 15px 0; font-size: 1.1rem; text-align: center;">🔍 Buscador de Bodega</h2>
            <div class="input-group">
                <input type="text" id="skuInput" placeholder="Escribe SKU..." autocomplete="off">
                <button id="searchBtn">IR</button>
            </div>
        </div>

        <div class="list-title">ZAPATOS EN LISTA</div>
        <div id="listaBusquedas"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
            authDomain: "buscadorcalzadoliv.firebaseapp.com",
            projectId: "buscadorcalzadoliv",
            storageBucket: "buscadorcalzadoliv.firebasestorage.app",
            messagingSenderId: "851864036279",
            appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const skuInput = document.getElementById('skuInput');
        const searchBtn = document.getElementById('searchBtn');
        const listaBusquedas = document.getElementById('listaBusquedas');

        // FUNCIÓN DE BÚSQUEDA
        async function ejecutarBusqueda() {
            const val = skuInput.value.trim().toUpperCase();
            if (!val) return;

            try {
                const q = query(collection(db, "calzado"), where("sku", "==", val));
                const snap = await getDocs(q);

                if (snap.empty) {
                    alert("No se encontró el SKU: " + val);
                } else {
                    snap.forEach(d => {
                        const data = d.data();
                        renderizarTarjeta(d.id, data.sku, data.marbete);
                    });
                }
                skuInput.value = "";
                skuInput.focus();
            } catch (error) {
                console.error(error);
                alert("Error de conexión con la base de datos.");
            }
        }

        function renderizarTarjeta(id, sku, marbete) {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="info">
                    <p class="marbete-text">📍 ${marbete}</p>
                    <p class="sku-text">SKU: ${sku}</p>
                </div>
                <div class="actions">
                    <button class="btn btn-dev" onclick="accionDevolver('${id}')">🔄 DEVUELTO</button>
                    <button class="btn btn-ven" onclick="accionVender('${id}', '${sku}', '${marbete}')">💰 VENDIDO</button>
                </div>
            `;
            listaBusquedas.prepend(card);
        }

        // REGISTRO DE FUNCIONES GLOBALES (Para que funcionen los onclick)
        window.accionDevolver = (id) => {
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.style.animation = "fadeOut 0.3s forwards";
                setTimeout(() => card.remove(), 300);
            }
        };

        window.accionVender = async (id, sku, marbete) => {
            if (!confirm(`¿Confirmar venta de ${sku}?`)) return;

            try {
                // 1. Borrar de Firebase
                await deleteDoc(doc(db, "calzado", id));

                // 2. Intentar guardar historial
                addDoc(collection(db, "historial"), {
                    sku, marbete, tipo: 'VENDIDO', fecha: serverTimestamp()
                }).catch(() => {});

                // 3. Feedback visual
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    card.classList.add('item-sold');
                    card.innerHTML = `<div style="padding:10px; color:var(--success); font-weight:bold;">✅ VENDIDO Y ELIMINADO</div>`;
                    setTimeout(() => {
                        card.style.animation = "fadeOut 0.5s forwards";
                        setTimeout(() => card.remove(), 500);
                    }, 1500);
                }
            } catch (e) {
                alert("Error al procesar la venta. Revisa las reglas de Firebase.");
            }
        };

        // Listeners
        searchBtn.addEventListener('click', ejecutarBusqueda);
        skuInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') ejecutarBusqueda();
        });

    </script>
</body>
</html>
