<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Acumulativo - Bodega</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --success: #22c55e; --text-dim: #94a3b8;
        }
        body { 
            background-color: var(--bg); color: #f1f5f9; 
            font-family: system-ui, sans-serif; padding: 15px; margin: 0;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 450px; }
        
        /* Buscador */
        .search-section {
            background: var(--card); padding: 20px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid #334155; position: sticky; top: 10px; z-index: 10;
        }
        .input-group { display: flex; gap: 8px; }
        input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #334155; 
            background: #0f172a; color: white; font-size: 16px;
        }
        #searchBtn { 
            background: var(--accent); color: #0f172a; border: none; 
            border-radius: 12px; padding: 0 20px; font-weight: bold; cursor: pointer;
        }

        /* Lista de Acumulados */
        .list-title { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px; padding-left: 5px; }
        #listaBusquedas { display: flex; flex-direction: column; gap: 12px; }

        .item-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            border-left: 5px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .info { flex: 1; }
        .marbete-text { font-size: 1.4rem; font-weight: bold; color: var(--accent); margin: 0; }
        .sku-text { font-size: 0.9rem; color: var(--text-dim); margin: 0; }

        .btn-sold { 
            background: #ef4444; color: white; border: none; 
            padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer;
            margin-left: 10px;
        }

        /* Estilo para items ya vendidos en la lista */
        .item-sold { border-left-color: var(--success); opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-section">
            <h2 style="margin:0 0 15px 0; font-size: 1.1rem; text-align: center;">Buscador de Calzado</h2>
            <div class="input-group">
                <input type="text" id="skuInput" placeholder="Escribe SKU..." autocomplete="off">
                <button id="searchBtn">IR</button>
            </div>
        </div>

        <div class="list-title">CALZADO EN MANO / BUSCADO</div>
        <div id="listaBusquedas">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBoQEvXvc_XUz7pmaLRXOl-74SRPR5e5i0",
            authDomain: "buscadorcalzadoliv.firebaseapp.com",
            projectId: "buscadorcalzadoliv",
            storageBucket: "buscadorcalzadoliv.firebasestorage.app",
            messagingSenderId: "851864036279",
            appId: "1:851864036279:web:be11ccf3880f6d05a3fe32"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const skuInput = document.getElementById('skuInput');
        const searchBtn = document.getElementById('searchBtn');
        const listaBusquedas = document.getElementById('listaBusquedas');

        async function buscar() {
            const val = skuInput.value.trim().toUpperCase();
            if(!val) return;

            try {
                const q = query(collection(db, "calzado"), where("sku", "==", val));
                const snap = await getDocs(q);

                if(snap.empty) {
                    alert("SKU no encontrado");
                } else {
                    snap.forEach(d => {
                        const item = d.data();
                        agregarAListaVisual(d.id, item.sku, item.marbete);
                        
                        // Opcional: Registrar en la base de datos para tus reportes
                        addDoc(collection(db, "historial"), {
                            sku: item.sku, marbete: item.marbete, tipo: 'BUSCADO', fecha: serverTimestamp()
                        });
                    });
                }
                skuInput.value = ""; // Limpiar para la siguiente búsqueda
                skuInput.focus();
            } catch (e) { console.error(e); }
        }

        function agregarAListaVisual(id, sku, marbete) {
            // Creamos la tarjeta sin borrar lo anterior
            const card = document.createElement('div');
            card.className = 'item-card';
            card.id = `card-${id}`; // ID único para poder modificarla después
            card.innerHTML = `
                <div class="info">
                    <p class="marbete-text">📍 ${marbete}</p>
                    <p class="sku-text">SKU: ${sku}</p>
                </div>
                <button class="btn-sold" onclick="vender('${id}', '${sku}', '${marbete}')">VENDIDO</button>
            `;
            // Insertar al principio de la lista (el más nuevo arriba)
            listaBusquedas.prepend(card);
        }

        window.vender = async (id, sku, marbete) => {
            if(!confirm(`¿Confirmar venta de ${sku}?`)) return;
            try {
                // 1. Borrar de Firebase
                await deleteDoc(doc(db, "calzado", id));
                
                // 2. Registrar venta en historial de Firebase
                await addDoc(collection(db, "historial"), {
                    sku, marbete, tipo: 'VENDIDO', fecha: serverTimestamp()
                });

                // 3. Modificar visualmente la tarjeta en la lista
                const card = document.getElementById(`card-${id}`);
                card.classList.add('item-sold');
                card.innerHTML = `
                    <div class="info">
                        <p class="marbete-text">💰 VENDIDO</p>
                        <p class="sku-text">SKU: ${sku} (Era de ${marbete})</p>
                    </div>
                `;
            } catch (e) { alert("Error al procesar venta"); }
        };

        searchBtn.addEventListener('click', buscar);
        skuInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') buscar(); });
    </script>
</body>
</html>
